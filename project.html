<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project | Harshil Bhakta</title>
    <meta
        name="description"
        content="Detailed project view for Harshil Bhakta portfolio projects."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="project-detail-page">
    <div class="page-shell project-detail-shell">
        <div class="ambient ambient-left"></div>
        <div class="ambient ambient-right"></div>
        <div class="ambient ambient-center"></div>

        <header class="site-header">
            <a class="brand" href="index.html">Harshil Bhakta</a>

            <nav class="site-nav" aria-label="Primary">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a class="active" href="projects.html">Projects</a>
            </nav>

            <a class="nav-cta" href="contact.html">Hire Me</a>
        </header>

        <main class="project-detail-layout">
            <a href="projects.html" class="back-link">Back to Projects</a>

            <section class="project-detail-hero">
                <div class="project-detail-copy">
                    <p class="eyebrow">Project Detail</p>
                    <h1 id="project-title">Loading project...</h1>
                    <p id="project-summary" class="project-summary-text"></p>
                    <div id="project-stack" class="project-tag-row"></div>
                    <div class="hero-actions">
                        <a id="github-link" class="button button-primary" href="#" target="_blank" rel="noreferrer">View GitHub</a>
                    </div>
                </div>

                <div class="project-detail-visual">
                    <img id="project-image" class="project-detail-image" alt="">
                </div>
            </section>

            <section class="project-detail-content">
                <article class="project-content-card">
                    <p class="experience-date">Overview</p>
                    <div id="project-description" class="project-detail-description"></div>
                </article>

                <section>
                    <p class="experience-date">Gallery</p>
                    <div id="project-gallery" class="project-gallery-grid"></div>
                </section>
            </section>
        </main>
    </div>

    <script>
        const projects = {
            pms: {
                title: "Performance Management System",
                summary: "Full-stack application for employee performance tracking, dashboards, and reporting workflows.",
                image: "images/projects/pms1.png",
                gallery: [
                    "images/projects/pms2.png",
                    "images/projects/pms3.png",
                    "images/projects/pms4.png"
                ],
                stack: ["HTML", "CSS", "JavaScript", "SQL"],
                description: `
                    <p>
                        A full-stack web application built to manage employee performance tracking,
                        review workflows, and reporting dashboards in one central system.
                    </p>
                    <ul>
                        <li>Tracks employee performance data in a structured way.</li>
                        <li>Provides managers with dashboards and reporting views.</li>
                        <li>Supports admin workflows for visibility into organizational productivity.</li>
                    </ul>
                    <p>
                        This project focused on combining a usable interface with practical business logic
                        and database-backed reporting.
                    </p>
                `,
                github: "https://github.com/Hbhakta02/travelRecommendation"
            },
            movie: {
                title: "Movie Booking Platform",
                summary: "Responsive movie discovery and booking experience built around dynamic browsing and UI polish.",
                image: "images/projects/movie1.png",
                gallery: [
                    "images/projects/movie2.png",
                    "images/projects/movie3.png",
                    "images/projects/movie4.png"
                ],
                stack: ["React", "Tailwind CSS", "TMDB API"],
                description: `
                    <p>
                        A React-based movie platform that allows users to browse films, search titles,
                        explore details, and move through a booking-oriented interface.
                    </p>
                    <ul>
                        <li>Includes search and filtering for easier movie discovery.</li>
                        <li>Uses a responsive UI built around modern front-end patterns.</li>
                        <li>Highlights featured content with strong visual presentation.</li>
                    </ul>
                    <p>
                        The project emphasized front-end structure, reusable components, and a smooth user flow.
                    </p>
                `,
                github: "https://github.com/Hbhakta02/seat-nerd-frontend"
            },
            disaster: {
                title: "Disaster Relief Coordination System",
                summary: "Database-driven system for managing volunteers, resources, and emergency supply distribution.",
                image: "images/projects/Heart1.png",
                gallery: [
                    "images/projects/Heart2.png",
                    "images/projects/Heart3.png",
                    "images/projects/Heart4.png"
                ],
                stack: ["SQL", "Database Design", "Backend Logic"],
                description: `
                    <p>
                        A coordination system designed to support emergency response efforts through structured
                        data, resource tracking, and volunteer management.
                    </p>
                    <ul>
                        <li>Organizes volunteer records and allocation workflows.</li>
                        <li>Tracks supplies and distribution logistics.</li>
                        <li>Supports relief planning through database-centered design.</li>
                    </ul>
                    <p>
                        This build focused on solving an operational problem through clear schema design
                        and practical backend thinking.
                    </p>
                `,
                github: "https://github.com/Hbhakta02/fullstack-capstone-project"
            },
            llm: {
                title: "LLM AI Assistant",
                summary: "Python-based assistant using local LLMs for text workflows, automation, and command handling.",
                image: "images/projects/LLM1.png",
                gallery: [
                    "images/projects/LLM2.png",
                    "images/projects/LLM3.png",
                    "images/projects/LLM4.png"
                ],
                stack: ["Python", "Local LLMs", "NLP"],
                description: `
                    <p>
                        A locally powered AI assistant built to handle automated responses, text analysis,
                        and task-oriented command processing.
                    </p>
                    <ul>
                        <li>Integrates local large language models into a usable workflow.</li>
                        <li>Supports summarization and text-processing style tasks.</li>
                        <li>Explores practical AI tooling beyond simple chat interactions.</li>
                    </ul>
                    <p>
                        The project centered on applying LLM capabilities in a more hands-on engineering context.
                    </p>
                `,
                github: "https://github.com/Hbhakta02/STE-Text-Conversion"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const projectName = params.get("name");
        const project = projects[projectName];

        const title = document.getElementById("project-title");
        const summary = document.getElementById("project-summary");
        const image = document.getElementById("project-image");
        const stack = document.getElementById("project-stack");
        const description = document.getElementById("project-description");
        const gallery = document.getElementById("project-gallery");
        const githubLink = document.getElementById("github-link");

        if (!project) {
            title.textContent = "Project not found";
            summary.textContent = "The requested project could not be loaded.";
            image.remove();
            githubLink.style.display = "none";
        } else {
            document.title = `${project.title} | Harshil Bhakta`;
            title.textContent = project.title;
            summary.textContent = project.summary;
            image.src = project.image;
            image.alt = project.title;
            description.innerHTML = project.description;
            githubLink.href = project.github;

            stack.innerHTML = "";
            project.stack.forEach((item) => {
                const tag = document.createElement("span");
                tag.textContent = item;
                stack.appendChild(tag);
            });

            gallery.innerHTML = "";
            project.gallery.forEach((src) => {
                const frame = document.createElement("div");
                frame.className = "project-gallery-card";

                const img = document.createElement("img");
                img.src = src;
                img.alt = `${project.title} screenshot`;

                frame.appendChild(img);
                gallery.appendChild(frame);
            });
        }
    </script>
</body>
</html>
