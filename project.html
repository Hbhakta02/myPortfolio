<script>

const projects = {

pms: {
title: "Performance Management System",
image: "images/projects/pms1.png",
gallery: [
"images/projects/pms2.png",
"images/projects/pms3.png",
"images/projects/pms4.png"
],
description: `
<p>
A full‑stack web application used to manage employee performance tracking,
reviews, and reporting dashboards.
</p>

<p>
Features include:
</p>

<ul>
<li>Employee performance tracking</li>
<li>Manager dashboards</li>
<li>Secure login system</li>
<li>Dynamic reporting tools</li>
</ul>

<p><strong>Tech Stack:</strong> Node.js, Express, SQL, HTML, CSS, JavaScript</p>
`,
github: "https://github.com/Hbhakta02/travelRecommendation",
},

movie: {
title: "Movie Booking Platform",
image: "images/projects/movie1.png",
gallery: [
"images/projects/movie2.png",
"images/projects/movie3.png",
"images/projects/movie4.png"
],
description: `
<p>
A React-based movie discovery and booking platform that allows users to
browse movies, search titles, and view showtimes.
</p>

<p><strong>Features:</strong></p>

<ul>
<li>Dynamic movie search</li>
<li>Hero carousel with featured films</li>
<li>Movie details page</li>
<li>Responsive UI</li>
</ul>

<p><strong>Tech Stack:</strong> React, Tailwind, TMDB API</p>
`,
github: "https://github.com/Hbhakta02/seat-nerd-frontend",
},

disaster: {
title: "Disaster Relief Coordination System",
image: "images/projects/heart1.png",
gallery: [
"images/projects/heart1.png",
"images/projects/heart2.png"
],
description: `
<p>
A database-driven system designed to coordinate disaster relief logistics,
including volunteer management, resource allocation, and location tracking.
</p>

<ul>
<li>Volunteer management system</li>
<li>Supply distribution tracking</li>
<li>Resource allocation database</li>
</ul>

<p><strong>Tech Stack:</strong> SQL, Database Design, Backend Logic</p>
`,
github: "https://github.com/Hbhakta02/fullstack-capstone-project",
},

llm: {
title: "LLM AI Assistant",
image: "images/projects/llm1.png",
gallery: [
"images/projects/llm1.png",
"images/projects/llm2.png"
],
description: `
<p>
A Python-based AI assistant built using local large language models to perform
text analysis, automated responses, and task execution.
</p>

<ul>
<li>Local LLM integration</li>
<li>Command processing</li>
<li>Text summarization</li>
</ul>

<p><strong>Tech Stack:</strong> Python, LLaMA, NLP</p>
`,
github: "https://github.com/Hbhakta02/STE-Text-Conversion",
}

};

const params = new URLSearchParams(window.location.search);
const projectName = params.get("name");

const project = projects[projectName];

if (project) {

document.getElementById("project-title").innerText = project.title;

document.getElementById("project-image").src = project.image;

const gallery = document.getElementById("project-gallery");
gallery.innerHTML = "";

if (project.gallery) {
project.gallery.forEach(img => {
const div = document.createElement("div");
div.innerHTML = `
<img src="${img}" style="width:100%; border-radius:10px;">
`;
gallery.appendChild(div);
});
}

document.getElementById("project-description").innerHTML = project.description;

document.getElementById("github-link").href = project.github;

document.getElementById("demo-link").href = project.demo;

} else {

document.getElementById("project-title").innerText = "Project Not Found";

}

</script>
